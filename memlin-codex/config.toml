# Memlin — Codex MCP fragment for the `codex plugin install` path.
#
# VERIFIED LIVE against Codex 0.142 (codex exec): Codex spawns a stdio MCP
# `command` DIRECTLY — no shell, and it does NOT expand variables in
# `command`/`args`. A node server pointed at "${PLUGIN_ROOT}/dist/mcp-server.js"
# dies with MODULE_NOT_FOUND (Codex passes the literal string to node). So we go
# through `/bin/sh -lc`, which expands $HOME at runtime. This works on
# macOS/Linux. It does NOT work on Windows (there is no /bin/sh — "os error 3");
# Windows users install with the no-git one-liner
# (https://memlin.ai/install-codex.ps1), which writes an absolute-`node`
# [mcp_servers.memlin] block straight into ~/.codex/config.toml instead.
#
# 0.2.26 is replaced with the real version at build time so the path
# matches the version-stamped dir Codex installs the plugin into.
[features]
hooks = true

[mcp_servers.memlin]
command = "/bin/sh"
args = ["-lc", "exec node \"$HOME/.codex/plugins/cache/memlin/memlin/0.2.26/dist/mcp-server.js\""]
startup_timeout_sec = 20

[mcp_servers.memlin.env]
MEMLIN_HOST = "codex"
MEMLIN_AGENT_VERSION = "0.2.26"
MEMLIN_AGENT_CAPABILITIES = "mcp,cli,hooks,rules,scribe,resolve"
